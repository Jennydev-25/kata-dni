<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kata DNI</title>
    <link rel="stylesheet" href="src/css/styles.css" />
</head>

<body>
    <header class="header">
        <h1 class="header__title">
            <span class="material-icons" aria-hidden="true">badge</span>
            Kata DNI
        </h1>
    </header>

    <main class="main">
        <section class="start-screen" id="start-screen">
            <button class="start-screen__btn" id="btn-start" aria-label="Iniciar calculadora de DNI">
                <span class="material-icons" aria-hidden="true">play_arrow</span>
                Iniciar
            </button>
        </section>

        <section class="checker" id="checker" aria-hidden="true">
            <div class="checker__display">
                <input class="checker__input" id="dni-input" type="text" readonly aria-label="Numero de DNI introducido"
                    placeholder="_ _ _ _ _ _ _ _" />
            </div>

            <div class="checker__actions">
                <button class="checker__btn checker__btn--calculate" id="btn-calculate"
                    aria-label="Calcular letra del DNI">
                    <span class="material-icons" aria-hidden="true">calculate</span>
                    Calcular
                </button>
                <button class="checker__btn checker__btn--cancel" id="btn-cancel" aria-label="Cancelar y reiniciar">
                    <span class="material-icons" aria-hidden="true">cancel</span>
                    Cancelar
                </button>
            </div>
        </section>
    </main>

    <script type="module" src="main.js"></script>
</body>

</html>
